<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompts - SecureNotes</title>
    <link rel="stylesheet" href="css/site2.css" />
    <link rel="stylesheet" href="css/prompts.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Lexend:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="logo">
            <div class="logo-icon">📝</div>
            <span>QUẢN LÝ GHI CHÚ</span>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-section">
            <div class="nav-section-title">Chính</div>
            <a href="index.html" class="nav-item">
              <svg
                class="nav-icon"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
                />
              </svg>
              <span>Trang chủ</span>
            </a>
            <a href="prompts.html" class="nav-item active">
              <svg
                class="nav-icon"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"
                />
              </svg>
              <span>Prompts</span>
            </a>
            <a href="notes.html" class="nav-item">
              <svg
                class="nav-icon"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
                />
              </svg>
              <span>Ghi chú</span>
            </a>
          </div>
          <div class="nav-section">
            <div class="nav-section-title">Bảo mật</div>
            <a href="accounts.html" class="nav-item">
              <svg
                class="nav-icon"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                />
              </svg>
              <span>Tài khoản</span>
            </a>
            <a href="tasks.html" class="nav-item">
              <svg
                class="nav-icon"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
                />
              </svg>
              <span>Tasks</span>
            </a>
          </div>
        </nav>
        <div class="sidebar-footer">
          <div class="user-profile">
            <div class="user-avatar">SN</div>
            <div class="user-info">
              <div class="user-name">Sawn05</div>
              <div class="user-email">user@example.com</div>
            </div>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <div class="page-header">
          <div class="header-top">
            <h1 class="page-title"><span>💬</span> Prompts</h1>
            <div class="header-actions">
              <button class="btn btn-secondary">
                <svg
                  width="18"
                  height="18"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"
                  />
                </svg>
                Lọc
              </button>
              <button class="btn btn-primary" onclick="openAddPromptModal()">
                <svg
                  width="18"
                  height="18"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 4v16m8-8H4"
                  />
                </svg>
                <!-- Tạo Prompt Mới -->
              </button>
            </div>
          </div>
          <div class="search-bar">
            <svg
              class="search-icon"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
              />
            </svg>
            <input
              type="text"
              class="search-input"
              placeholder="Tìm kiếm prompts..."
              id="searchInput"
            />
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
          <div class="stat-card">
            <div
              class="stat-icon"
              style="background: linear-gradient(135deg, #667eea, #764ba2)"
            >
              <svg
                width="24"
                height="24"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"
                />
              </svg>
            </div>
            <div class="stat-content">
              <div class="stat-label">Tổng Prompts</div>
              <div class="stat-value" id="stat-total-prompts">6</div>
            </div>
          </div>
          <div class="stat-card">
            <div
              class="stat-icon"
              style="background: linear-gradient(135deg, #f093fb, #f5576c)"
            >
              <svg
                width="24"
                height="24"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"
                />
              </svg>
            </div>
            <div class="stat-content">
              <div class="stat-label">Yêu thích</div>
              <div class="stat-value" id="stat-fav-prompts">3</div>
            </div>
          </div>
          <div class="stat-card">
            <div
              class="stat-icon"
              style="background: linear-gradient(135deg, #4facfe, #00f2fe)"
            >
              <svg
                width="24"
                height="24"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"
                />
              </svg>
            </div>
            <div class="stat-content">
              <div class="stat-label">Danh mục</div>
              <div class="stat-value">5</div>
            </div>
          </div>
          <div class="stat-card">
            <div
              class="stat-icon"
              style="background: linear-gradient(135deg, #fa709a, #fee140)"
            >
              <svg
                width="24"
                height="24"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
                />
              </svg>
            </div>
            <div class="stat-content">
              <div class="stat-label">Gần đây</div>
              <div class="stat-value">5</div>
            </div>
          </div>
        </div>

        <!-- Categories Filter -->
        <div class="categories-section">
          <h2 class="section-title">Danh mục</h2>
          <div class="categories-grid">
            <button class="category-chip active">
              <span class="chip-icon">📝</span>Tất cả
            </button>
            <button class="category-chip">
              <span class="chip-icon">💼</span>Công việc
            </button>
            <button class="category-chip">
              <span class="chip-icon">💻</span>Lập trình
            </button>
            <button class="category-chip">
              <span class="chip-icon">✍️</span>Viết lách
            </button>
            <button class="category-chip">
              <span class="chip-icon">📧</span>Email
            </button>
            <button class="category-chip">
              <span class="chip-icon">🎨</span>Sáng tạo
            </button>
          </div>
        </div>

        <!-- Prompts Grid — rendered by JS -->
        <div class="prompts-section">
          <h2 class="section-title">Prompts của bạn</h2>
          <div class="prompts-grid" id="prompts-grid-container">
            <!-- site.js will render cards here -->
          </div>
        </div>
      </main>
    </div>

    <script src="js/site2.js"></script>
  </body>
</html>
